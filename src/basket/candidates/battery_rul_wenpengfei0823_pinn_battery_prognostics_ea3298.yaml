  readme_excerpt: '# PINN_Battery_Prognostics


    This repository includes the code and data for the paper "***Physics-Informed
    Neural Networks for Prognostics and Health Management of Lithium-Ion Batteries***"


    ## Abstract


    For Prognostics and Health Management (PHM) of Lithium-ion (Li-ion) batteries,
    many models have been established to characterize their degradation process. The
    existing empirical or physical models can reveal important information regarding
    the degradation dynamics. However, there are no general and flexible methods to
    fuse the information represented by those models. Physics-Informed Neural Network
    (PINN) is an efficient tool to fuse empirical or physical dynamic models with
    data-driven models. To take full advantage of various information sources, we
    propose a model fusion scheme based on PINN. It is implemented by developing a
    semi-empirical semi-physical Partial Differential Equation (PDE) to model the
    degradation dynamics of Li-ion batteries. When there is little prior knowledge
