    > **Authors:**

    Jiahui Huang, Lei Liu, Hongwei Zhao, Tianqi Li, Bin Li.


    This repo contains the code and data from our paper published in Journal of Energy
    Storage.


    Website: https://www.sciencedirect.com/science/article/pii/S2352152X25010898?dgcid=author.


    ## 1. Abstract


    Lithium-ion batteries play a crucial role in the fields of renewable energy and
    electric vehicles. Accurately predicting their Remaining Useful Life (RUL) is
    essential for ensuring safe and reliable operation. However, achieving precise
    RUL predictions poses significant challenges due to the complexities of degradation
    mechanisms and the impact of operational noise, particularly the capacity regeneration
    phenomenon. To address these issues, we propose a lithium-ion battery RUL prediction
    model named RUL-Mamba, which is based on the Mamba-Feature Attention Network (FAN)-Gated
